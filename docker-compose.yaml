services:
  postgres_db:
    image: postgres:17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: viora_streaming_db
      POSTGRES_USER: viora_streaming_user
      POSTGRES_PASSWORD: viora_streaming_password
    volumes:
      - viora_streaming_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5
  viora_core:
    build:
      context: ./viora-streaming-core
      dockerfile: Dockerfile
    container_name: viora_streaming_core
    env_file:
      - .env
    environment:
      SERVER_PORT: ${SERVER_PORT:-8080}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      JAVA_OPTS: ${JAVA_OPTS:--Xms256m -Xmx512m}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${SERVER_PORT:-8080}:${SERVER_PORT:-8080}"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure


volumes:
  viora_streaming_data: